<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="KAYA">
  <meta name="mobile-web-app-capable" content="yes">
  <title>KAYA Fitness</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --panel: #141416;
      --panel-2: #1c1c1f;
      --panel-3: #252529;
      --line: rgba(255,255,255,.08);
      --line-strong: rgba(255,255,255,.14);
      --text: #fff;
      --muted: rgba(235,235,245,.56);
      --dim: rgba(235,235,245,.34);
      --red: #fa114f;
      --red-soft: #ff6482;
      --green: #34c759;
      --green-soft: #b9ff3c;
      --cyan: #1eeaef;
      --blue: #00b0ff;
      --orange: #ff9f0a;
      --purple: #8e8eff;
      --danger: #ff453a;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --shadow: 0 18px 50px rgba(0,0,0,.5);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }
    button, input, textarea, select {
      font: inherit;
      color: inherit;
    }
    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 2px;
    }
    ::selection { background: rgba(30,234,239,.32); }
    ::-webkit-scrollbar { width: 0; height: 0; }

    .app-shell {
      position: relative;
      width: min(100vw, 480px);
      height: 100vh;
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 15% 5%, rgba(250,17,79,.16), transparent 30%),
        radial-gradient(circle at 92% 18%, rgba(30,234,239,.13), transparent 28%),
        #000;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .topbar {
      position: relative;
      z-index: 8;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: calc(12px + env(safe-area-inset-top, 0px)) 18px 12px;
      background: rgba(0,0,0,.72);
      border-bottom: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .brand-title {
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 3px;
      line-height: 1;
      background: linear-gradient(90deg, #fff, #bfc2c8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .brand-sub {
      font-size: 11px;
      font-weight: 700;
      color: var(--dim);
      white-space: nowrap;
      letter-spacing: .3px;
      text-transform: uppercase;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .streak-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,100,50,.26);
      background: linear-gradient(135deg, rgba(255,100,50,.20), rgba(250,17,79,.13));
      font-weight: 900;
      font-size: 13px;
    }
    .streak-pill svg { color: var(--red-soft); }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3a3a3d, #161618);
      border: 1px solid rgba(255,255,255,.14);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 13px;
    }

    .content {
      flex: 1;
      min-height: 0;
      height: auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 18px 16px 18px;
    }
    .tab-view { animation: rise .28s ease both; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes ringfill {
      from { stroke-dashoffset: var(--circ); }
      to { stroke-dashoffset: var(--off); }
    }
    @keyframes pulse {
      0%, 100% { opacity: .52; }
      50% { opacity: .86; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    .bottom-nav {
      position: relative;
      z-index: 9;
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
      padding: 8px 6px calc(8px + var(--safe-bottom));
      background: rgba(0,0,0,.74);
      border-top: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .nav-btn {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 54px;
      border-radius: 14px;
      background: transparent;
      color: rgba(235,235,245,.38);
      font-size: 10px;
      font-weight: 800;
    }
    .nav-btn svg { width: 23px; height: 23px; }
    .nav-btn[aria-current="page"] {
      color: #fff;
      background: rgba(255,255,255,.06);
    }

    .hero-title {
      font-size: 27px;
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: 0;
      margin: 2px 4px 16px;
    }
    .section-title {
      margin: 22px 4px 12px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .7px;
      color: var(--dim);
      text-transform: uppercase;
    }
    .stack { display: grid; gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .card {
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
      overflow: hidden;
    }
    .card.pad { padding: 16px; }
    .card.hero-card {
      border-radius: var(--radius-lg);
      background:
        radial-gradient(circle at 8% 6%, rgba(250,17,79,.22), transparent 36%),
        linear-gradient(180deg, #1d1d20, #121214);
    }
    .card.workout-hero {
      position: relative;
      border-color: rgba(255,100,50,.22);
      background:
        radial-gradient(circle at 100% 0%, rgba(255,55,95,.24), transparent 34%),
        linear-gradient(135deg, #2a1116, #151417 62%);
    }
    .card.cyan-hero {
      border-color: rgba(30,234,239,.18);
      background:
        radial-gradient(circle at 100% 10%, rgba(30,234,239,.18), transparent 35%),
        linear-gradient(180deg, #101d23, #131416);
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .row.start { align-items: flex-start; }
    .muted { color: var(--muted); }
    .dim { color: var(--dim); }
    .tiny {
      font-size: 11px;
      color: var(--dim);
      font-weight: 800;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .big-number {
      font-weight: 900;
      font-size: 38px;
      line-height: .95;
      letter-spacing: 0;
    }
    .metric-value {
      font-weight: 900;
      font-size: 26px;
      line-height: 1;
      letter-spacing: 0;
    }
    .subtext {
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
      font-weight: 650;
    }
    .body-copy {
      color: rgba(235,235,245,.78);
      font-size: 13px;
      line-height: 1.48;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 26px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
      background: rgba(255,255,255,.08);
      color: rgba(235,235,245,.82);
      border: 1px solid rgba(255,255,255,.05);
    }
    .badge.red { color: var(--red-soft); background: rgba(250,17,79,.14); border-color: rgba(250,17,79,.18); }
    .badge.green { color: var(--green); background: rgba(52,199,89,.14); border-color: rgba(52,199,89,.18); }
    .badge.cyan { color: var(--cyan); background: rgba(30,234,239,.13); border-color: rgba(30,234,239,.18); }
    .badge.orange { color: var(--orange); background: rgba(255,159,10,.13); border-color: rgba(255,159,10,.18); }
    .badge.purple { color: var(--purple); background: rgba(142,142,255,.13); border-color: rgba(142,142,255,.18); }

    .btn {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 14px;
      padding: 11px 14px;
      background: #25252a;
      color: #fff;
      font-weight: 850;
      border: 1px solid rgba(255,255,255,.08);
    }
    .btn svg { width: 18px; height: 18px; }
    .btn.primary {
      background: linear-gradient(135deg, var(--red-soft), var(--red));
      border-color: rgba(250,17,79,.5);
      box-shadow: 0 8px 22px rgba(250,17,79,.27);
    }
    .btn.cyan {
      color: #031315;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border-color: rgba(30,234,239,.45);
      box-shadow: 0 8px 22px rgba(30,234,239,.17);
    }
    .btn.green {
      color: #041407;
      background: linear-gradient(135deg, var(--green-soft), var(--green));
      border-color: rgba(52,199,89,.45);
    }
    .btn.ghost {
      background: rgba(255,255,255,.06);
      color: rgba(235,235,245,.86);
    }
    .btn.danger {
      color: var(--danger);
      background: rgba(255,69,58,.08);
      border-color: rgba(255,69,58,.22);
    }
    .btn.small {
      min-height: 34px;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
    }
    .btn.icon {
      width: 42px;
      padding: 0;
      flex-shrink: 0;
    }
    .full { width: 100%; }

    .ring-wrap {
      display: grid;
      grid-template-columns: 172px 1fr;
      align-items: center;
      gap: 18px;
      min-height: 178px;
    }
    .rings { width: 172px; height: 172px; }
    .ring-track { opacity: .18; }
    .ring-progress {
      stroke-linecap: round;
      animation: ringfill 1s cubic-bezier(.4,0,.2,1) both;
    }
    .ring-metrics { display: grid; gap: 13px; min-width: 0; }
    .ring-label { font-size: 11px; font-weight: 900; letter-spacing: .6px; text-transform: uppercase; }
    .ring-num { font-size: 23px; font-weight: 900; line-height: 1; }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .quick-btn {
      min-width: 0;
      min-height: 82px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 16px;
      color: rgba(235,235,245,.86);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.06);
      font-size: 11px;
      font-weight: 850;
    }
    .quick-btn svg { width: 24px; height: 24px; color: var(--cyan); }

    .habit-row {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0 12px;
      border-top: 1px solid rgba(255,255,255,.06);
      text-align: left;
      appearance: none;
      -webkit-appearance: none;
    }
    .habit-row:first-child { border-top: 0; padding-top: 0; }
    .check {
      width: 25px;
      height: 25px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.04);
      border: 2px solid rgba(255,255,255,.18);
      color: transparent;
      flex-shrink: 0;
    }
    .habit-row.done .check {
      background: var(--green);
      border-color: var(--green);
      color: #031505;
    }
    .habit-copy {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 7px;
    }
    .habit-main {
      min-width: 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }
    .habit-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 850;
      color: #fff;
    }
    .habit-meta {
      flex-shrink: 0;
      max-width: 48%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
      font-size: 12px;
      color: var(--dim);
      font-weight: 800;
    }
    .habit-progress {
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
    }
    .habit-progress > span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--green));
    }
    .habit-row.done .habit-progress > span { width: 100% !important; background: var(--green); }
    .habit-dashboard {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .habit-card {
      border-radius: 16px;
      padding: 13px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
    }
    .habit-topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .habit-value {
      font-size: 25px;
      font-weight: 950;
      line-height: 1;
      margin-top: 7px;
    }
    .habit-value span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 850;
    }
    .habit-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 11px;
    }
    .habit-actions .btn {
      min-height: 34px;
      padding: 0 11px;
      font-size: 12px;
    }
    .habit-card.done {
      border-color: rgba(52,199,89,.32);
      background: linear-gradient(180deg, rgba(52,199,89,.13), rgba(255,255,255,.035));
    }
    .habit-card.done .habit-value { color: var(--green); }
    .plan-toggle {
      display: flex;
      padding: 3px;
      gap: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }
    .plan-toggle .chip {
      margin: 0;
      min-height: 31px;
      padding: 0 12px;
    }
    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }
    .month-day {
      min-height: 74px;
      border-radius: 13px;
      padding: 8px 6px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.035);
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }
    .month-day.today {
      border-color: rgba(250,17,79,.45);
      background: rgba(250,17,79,.10);
    }
    .month-day.done {
      border-color: rgba(52,199,89,.38);
      background: rgba(52,199,89,.10);
    }
    .month-num {
      font-size: 11px;
      font-weight: 950;
      color: rgba(235,235,245,.78);
    }
    .month-workout {
      font-size: 9px;
      line-height: 1.15;
      font-weight: 850;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .template-sections {
      display: grid;
      gap: 8px;
      margin: 12px 0;
    }
    .template-section-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
    }

    .workout-step {
      border-radius: 16px;
      background: #151517;
      border: 1px solid rgba(255,255,255,.08);
      padding: 14px;
      margin-bottom: 10px;
    }
    .workout-step-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .step-number {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: rgba(255,255,255,.07);
      color: rgba(235,235,245,.72);
      font-size: 12px;
      font-weight: 900;
    }
    .workout-log {
      margin-top: 11px;
      border-top: 1px solid rgba(255,255,255,.07);
      padding-top: 11px;
    }
    .workout-log summary {
      cursor: pointer;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 900;
      list-style: none;
    }
    .workout-log summary::-webkit-details-marker { display: none; }
    .workout-page {
      padding-bottom: 20px;
    }
    .workout-top {
      position: sticky;
      top: -18px;
      z-index: 5;
      margin: -18px -16px 14px;
      padding: 14px 16px 12px;
      background: rgba(0,0,0,.82);
      border-bottom: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .done-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .done-toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
    }
    .exercise-guide {
      display: grid;
      gap: 9px;
      margin-top: 12px;
      padding: 11px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
    }
    .set-table {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .set-row {
      display: grid;
      grid-template-columns: 54px 1fr 1fr;
      align-items: end;
      gap: 8px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.035);
    }
    .set-row.done {
      border-color: rgba(52,199,89,.34);
      background: rgba(52,199,89,.09);
    }
    .set-check {
      display: grid;
      place-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-align: center;
    }
    .set-check input {
      width: 22px;
      height: 22px;
      accent-color: var(--green);
    }
    .set-row .field {
      margin: 0;
    }
    .workout-progress-text {
      font-size: 12px;
      font-weight: 900;
      color: var(--green);
    }

    .search {
      width: 100%;
      min-height: 45px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 14px;
      padding: 0 13px;
      background: #1c1c1f;
      border: 1px solid rgba(255,255,255,.08);
      margin-bottom: 13px;
    }
    .search svg { width: 18px; height: 18px; color: var(--dim); flex-shrink: 0; }
    .search input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: #fff;
      font-size: 15px;
    }
    .search input::placeholder { color: var(--dim); }
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 0 4px;
      margin-bottom: 16px;
    }
    .chip {
      min-height: 34px;
      flex-shrink: 0;
      border-radius: 999px;
      padding: 8px 14px;
      color: rgba(235,235,245,.72);
      background: #1c1c1f;
      border: 1px solid rgba(255,255,255,.08);
      font-size: 13px;
      font-weight: 850;
    }
    .chip.active {
      color: #000;
      background: #fff;
      border-color: #fff;
    }

    .template-card,
    .skill-card,
    .session-row,
    .pr-row {
      border-radius: 16px;
      background: #151517;
      border: 1px solid rgba(255,255,255,.07);
      overflow: hidden;
    }
    .template-head,
    .skill-head {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: transparent;
      text-align: left;
    }
    .template-icon,
    .skill-id {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: grid;

      inset: 0;
      display: grid;

      display: flex;
      flex-direction: column;
      margin: 0 auto;
      border-radius: 24px;

        if (record.metrics[key] == null) record.metrics[key] = "";
      });
      if (record.skillReps == null) record.skillReps = 0;
      if (record.muayThaiReps == null) record.muayThaiReps = 0;
      if (record.soccerMinutes == null) record.soccerMinutes = 0;
      if (!record.skillLog) record.skillLog = {};
      if (!Array.isArray(record.completedTemplates)) record.completedTemplates = [];
      if (record.note == null) record.note = "";
      updateHabitCompletion(record);
      return record;
    }

    function updateHabitCompletion(record) {
      if (!record || !record.metrics || !record.habits) return record;
      var targets = (state && state.targets) ? state.targets : { water: 12, protein: 165, creatine: 5, steps: 9000 };
      record.habits.water = num(record.metrics.water) >= num(targets.water, 12);
      record.habits.protein = num(record.metrics.protein) >= num(targets.protein, 165);
      record.habits.creatine = num(record.metrics.creatine) >= num(targets.creatine, 5);
      record.habits.steps = num(record.metrics.steps) >= num(targets.steps, 9000);
      record.habits.mobility = num(record.metrics.mobility) >= 10;
      record.habits.meditation = num(record.metrics.meditation) >= 5;
      return record;
    }

    function habitStats(rec) {
      updateHabitCompletion(rec);
      var keys = ["water","protein","creatine","steps","mobility","meditation"];
      return { done: keys.filter(function (key) { return !!rec.habits[key]; }).length, total: keys.length };
    }

    function esc(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, function (ch) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" })[ch];
      });
    }
    function attr(value) { return esc(value).replace(/`/g, "&#096;"); }
    function num(value, fallback) {
      var n = Number(value);
      return Number.isFinite(n) ? n : (fallback || 0);
    }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function pct(value, target) { return target > 0 ? clamp(value / target, 0, 1) : 0; }
    function round(value, digits) {
      var p = Math.pow(10, digits || 0);
      return Math.round(value * p) / p;
    }
    function fmtDate(dateKey) {
      var d = new Date(dateKey + "T12:00:00");
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    }
    function fmtLongDate(d) {
      return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" }).toUpperCase();
    }
    function dayCode(date) {
      return ["SUN","MON","TUE","WED","THU","FRI","SAT"][(date || new Date()).getDay()];
    }
    function currentMeasurement() {
      if (!state.measurements.length) return {};
      return state.measurements.slice().sort(function (a, b) { return a.date.localeCompare(b.date); }).slice(-1)[0] || {};
    }
    function weekTemplates() {
      var order = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
      return order.map(function (day) {
        return state.templates.find(function (t) { return t.day === day; }) || null;
      }).filter(Boolean);
    }
    function todaysTemplate() {
      var code = dayCode();
      return state.templates.find(function (t) { return t.day === code; }) || state.templates[0];
    }
    function sessionsOn(date) {
      return state.sessions.filter(function (s) { return s.date === date; });
    }
    function lastNDays(n) {
      var out = [];
      var now = new Date();
      for (var i = n - 1; i >= 0; i--) {
        var d = new Date(now);
        d.setDate(now.getDate() - i);
        out.push(d.toISOString().slice(0, 10));
      }
      return out;
    }
    function streak() {
      var days = lastNDays(365).reverse();
      var count = 0;
      for (var i = 0; i < days.length; i++) {
        if (activityScore(days[i]) > 0) count++;
        else if (i === 0) continue;
        else break;
      }
      return count;
    }
    function activityScore(date) {
      var d = state.days[date];
      var sessions = sessionsOn(date).length;
      var soccer = state.soccerSessions.filter(function (s) { return s.date === date; }).length;
      if (!d) return (sessions || soccer) ? 4 : 0;
      var habits = Object.values(d.habits || {}).filter(Boolean).length;
      var skills = num(d.skillReps) + num(d.muayThaiReps);
      return Math.min(4, sessions * 2 + soccer * 2 + Math.floor(habits / 2) + (skills >= 25 ? 1 : 0) + (num(d.soccerMinutes) >= 20 ? 1 : 0));
    }
    function tier(reps) {
      var tiers = [[25,"Started"],[100,"Familiar"],[250,"Reliable"],[500,"Sharp"],[1000,"Complete"]];
      var label = "New";
      var lo = 0;
      var hi = 25;
      var next = "Started";
      for (var i = 0; i < tiers.length; i++) {
        if (reps >= tiers[i][0]) {
          label = tiers[i][1];
          lo = tiers[i][0];
          hi = tiers[i + 1] ? tiers[i + 1][0] : tiers[i][0];
          next = tiers[i + 1] ? tiers[i + 1][1] : "Max";
        } else {
          hi = tiers[i][0];
          next = tiers[i][1];
          break;
        }
      }
      var bar = round(pct(reps, 1000) * 100, 1);
      return { label: label, next: next, bar: clamp(bar, 0, 100) };
    }

    function renderRings(movePct, trainPct, skillPct) {

        ringCircle(100, 628, movePct, "url(#gMove)", "#fa114f", ".12s") +

    function ringCircle(r, circ, value, stroke, track, delay) {

    function renderHabitTracker(metric, label, value, target, unit, actions) {

    function renderMonthWorkouts() {

      var cells = [];

        var d = new Date(year, month, day);
        var key = dateKeyFrom(d);
        var template = state.templates.find(function (t) { return t.day === dayCode(d); });
        var done = sessionsOn(key).some(function (s) { return template && s.templateId === template.id; });

    function dateKeyFrom(d) {

    function recoveryScore(rec) {
      var sleep = pct(num(rec.metrics.sleep), state.targets.sleep) * 40;

      var summary = habitStats(rec);
      var habits = summary.done / summary.total * 30;
      return clamp(Math.round(sleep + soreness + habits), 0, 100);
    }
    function recoveryCopy(rec) {

    function renderTrain() {

        return matchesFilter && (!query || hay.indexOf(query) >= 0);

          '<div style="margin-top:14px;"><div class="tiny">' + esc(title) + ' readiness</div><div style="font-size:34px;font-weight:900;margin-top:5px;">' + readiness.score + '%</div><div class="subtext">' + esc(readiness.sub) + '</div></div>' +

        '<span class="badge ' + color + '" style="font-size:16px;min-width:62px;min-height:42px;">' + score + '%</span>' +
      '</button>';

    function miniStat(label, value, unit, color) {
      return '<div class="card pad" style="padding:13px;"><div class="tiny">' + esc(label) + '</div><div class="metric-value" style="margin-top:8px;color:' + color + ';">' + esc(value) + '</div><div class="subtext">' + esc(unit) + '</div></div>';
    }
    function bjjReadiness() {
      var p = state.principles.filter(function (x) { return num(x.reps) >= 500; }).length;
      var c = state.combatives.filter(function (x) { return num(x.reps) >= 250; }).length;
      var score = Math.round(((p / Math.max(1, state.principles.length)) * .45 + (c / Math.max(1, state.combatives.length)) * .55) * 100);
      return { score: score, sub: p + " principles functional, " + c + " combatives familiar." };
    }
    function muayThaiReadiness() {
      var p = state.muayThaiPrinciples.filter(function (x) { return num(x.reps) >= 250; }).length;
      var t = state.muayThaiTechniques.filter(function (x) { return num(x.reps) >= 250; }).length;
      var score = Math.round(((p / Math.max(1, state.muayThaiPrinciples.length)) * .4 + (t / Math.max(1, state.muayThaiTechniques.length)) * .6) * 100);
      return { score: score, sub: p + " principles sharp, " + t + " techniques drilled." };
    }
    function renderSkillCard(item) {
      var id = item.kind + "-" + item.id;
      var open = !!ui.expanded[id];
      var t = tier(item.reps || 0);
      var solo = soloBadge(item.solo);
      var isTechnique = item.kind === "combative" || item.kind === "mt-technique";
      var isMuay = item.kind.indexOf("mt-") === 0;
      var sub = isTechnique ? item.position + " - " + item.reps + " / 1000 points" : t.label + " - " + item.reps + " / 1000 points";
      return '<article class="skill-card">' +
        '<button class="skill-head" type="button" data-action="toggle-skill" data-id="' + attr(id) + '">' +

          '<div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:900;">' + esc(item.name) + '</div><div class="subtext">' + esc(sub) + '</div></div>' +
          '<span class="badge ' + solo.cls + '">' + esc(solo.text) + '</span>' +
        '</button>' +
        (open ? '<div class="skill-body">' +
          '<p class="body-copy" style="margin:0;">' + esc(isTechnique ? item.purpose : item.what) + '</p>' +
          '<div><div class="tiny">' + (isTechnique ? "Sequence" : "Why") + '</div><p class="body-copy" style="margin:5px 0 0;">' + esc(isTechnique ? item.steps : item.why) + '</p></div>' +
          '<div><div class="tiny">' + (isTechnique ? "Key detail" : "How") + '</div><p class="body-copy" style="margin:5px 0 0;">' + esc(isTechnique ? item.key : item.how) + '</p></div>' +
          (item.notes ? '<div><div class="tiny">Notes</div><p class="body-copy" style="margin:5px 0 0;">' + esc(item.notes) + '</p></div>' : "") +
          '<div><div class="row"><span class="subtext">' + esc(item.reps) + ' / 1000 points</span><span class="subtext">' + t.bar + '%</span></div><div class="progress-bar ' + (isMuay ? "red" : isTechnique ? "green" : "") + '" style="margin-top:6px;"><span style="width:' + t.bar + '%"></span></div></div>' +
          '<div class="row"><span class="subtext">1 completion = 1 point. Next: ' + esc(t.next) + '</span><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;"><button class="btn small ghost" type="button" data-action="favorite-skill" data-kind="' + attr(item.kind) + '" data-id="' + attr(item.id) + '">' + (item.favorite ? "Saved" : "Save") + '</button><button class="btn small cyan" type="button" data-action="add-skill-reps" data-kind="' + attr(item.kind) + '" data-id="' + attr(item.id) + '" data-amount="1">' + icon("check") + 'Complete +1</button><button class="btn small ghost" type="button" data-action="open-skill" data-kind="' + attr(item.kind) + '" data-id="' + attr(item.id) + '">' + icon("edit") + 'Edit</button></div></div>' +
        '</div>' : "") +
      '</article>';

    function soloBadge(solo) {

      if (solo === "dummy") return { text: "Dummy", cls: "orange" };

        '<div class="row" style="margin:18px 4px 12px;"><div class="section-title" style="margin:0;">' + esc(progressTitle(ui.progressFilter)) + '</div><button class="btn small danger" type="button" data-action="confirm-reset-progress">' + icon("trash") + 'Reset</button></div>' +

        '<div class="section-title">Personal records</div>' +
        '<section class="stack">' + Object.keys(state.prs).sort().map(renderPRRow).join("") + '</section>' +

    function progressHero(filter, weekVolume, heat) {
      if (filter === "lift") {
        return '<section class="card hero-card pad"><div class="tiny">Weights</div><div style="font-size:34px;font-weight:900;margin-top:6px;">' + weightReadiness() + '%</div><div class="subtext">Strength readiness based on recent lift frequency and this week\'s volume.</div><div class="chips" style="margin-top:14px;"><span class="badge red">' + Math.round(weekVolume).toLocaleString() + ' lb this week</span><span class="badge">' + progressSessions("lift").length + ' lift sessions</span></div></section>';
      }
      if (filter === "bjj") {
        var bjj = bjjReadiness();
        return '<section class="card hero-card pad"><div class="tiny">Jiu-Jitsu</div><div style="font-size:34px;font-weight:900;margin-top:6px;">' + bjj.score + '%</div><div class="subtext">' + esc(bjj.sub) + '</div><div class="chips" style="margin-top:14px;"><span class="badge cyan">' + totalSkillReps("bjj").toLocaleString() + ' points</span><span class="badge">' + progressSessions("bjj").length + ' sessions</span></div></section>';
      }

        var mt = muayThaiReadiness();
        return '<section class="card hero-card pad"><div class="tiny">Muay Thai</div><div style="font-size:34px;font-weight:900;margin-top:6px;">' + mt.score + '%</div><div class="subtext">' + esc(mt.sub) + '</div><div class="chips" style="margin-top:14px;"><span class="badge red">' + totalSkillReps("muay").toLocaleString() + ' points</span><span class="badge">' + progressSessions("muay").length + ' sessions</span></div></section>';
      }
      if (filter === "soccer") {
        return '<section class="card hero-card pad"><div class="tiny">Soccer</div><div style="font-size:34px;font-weight:900;margin-top:6px;">' + soccerReadiness() + '%</div><div class="subtext">' + esc(soccerReadinessText()) + '</div><div class="chips" style="margin-top:14px;"><span class="badge green">' + num(dayRecord().soccerMinutes) + ' min today</span><span class="badge">' + state.soccerSessions.length + ' sessions</span></div></section>';
      }
      return '<section class="card hero-card pad">' +
        '<div class="tiny">Overall</div><div style="font-size:34px;font-weight:900;margin-top:6px;">' + overallReadiness() + '%</div>' +
        '<div class="subtext">Combined consistency, strength work, BJJ, Muay Thai, soccer, and body trend.</div>' +
        '<div class="heatmap" style="margin-top:14px;">' + heat + '</div>' +
      '</section>';
    }

    function renderProgressMetrics(filter, m, weekVolume) {
      if (filter === "lift") {
        return '<section class="grid-2">' +
          metricPanel("Week Volume", Math.round(weekVolume).toLocaleString(), "lb", state.sessions.filter(function (s) { return s.type === "Lift"; }).length + " total lift sessions", "") +
          metricPanel("14 Day Lifts", state.sessions.filter(function (s) { return s.type === "Lift" && lastNDays(14).indexOf(s.date) >= 0; }).length, "sessions", "Target 8 in 14 days", "") +
          metricPanel("Best PR", bestPRName(), "", bestPRText(), "") +
          metricPanel("Streak", streak(), "days", "Activity on tracked days", "") +
        '</section>';
      }
      if (filter === "bjj") {
        var bjj = bjjReadiness();
        return '<section class="grid-2">' +
          metricPanel("Today", num(dayRecord().skillReps), "points", "BJJ points logged today", "") +
          metricPanel("Total Points", totalSkillReps("bjj").toLocaleString(), "points", "Principles and combatives", "") +
          metricPanel("Principles", state.principles.filter(function (x) { return num(x.reps) >= 500; }).length, "functional", bjj.sub, "") +
          metricPanel("Combatives", state.combatives.filter(function (x) { return num(x.reps) >= 250; }).length, "familiar", "Gracie combatives tracked", "") +
        '</section>';
      }
      if (filter === "muay") {
        var mt = muayThaiReadiness();
        return '<section class="grid-2">' +
          metricPanel("Today", num(dayRecord().muayThaiReps), "points", "Muay Thai points logged today", "") +
          metricPanel("Total Points", totalSkillReps("muay").toLocaleString(), "points", "Principles and techniques", "") +
          metricPanel("Principles", state.muayThaiPrinciples.filter(function (x) { return num(x.reps) >= 250; }).length, "sharp", mt.sub, "") +
          metricPanel("Techniques", state.muayThaiTechniques.filter(function (x) { return num(x.reps) >= 250; }).length, "drilled", "Striking and clinch work", "") +
        '</section>';

        return '<section class="grid-2">' +
          metricPanel("Today", num(dayRecord().soccerMinutes), "min", "Soccer minutes logged today", "") +
          metricPanel("14 Day Work", mins14, "min", "Target 180 minutes", "") +
          metricPanel("Drills", state.soccerDrills.length, "items", "Touch, passing, finishing, defense", "") +
          metricPanel("Sessions", state.soccerSessions.length, "logged", "Field work history", "") +
        '</section>';
      }
      return '<section class="grid-2">' +
        metricPanel("Weight", m.weight || "-", "lb", measurementDelta("weight"), renderSpark("weight", "#34c759")) +

        metricPanel("Week Volume", Math.round(weekVolume).toLocaleString(), "lb", state.sessions.length + " total sessions", "") +
        metricPanel("Streak", streak(), "days", "Activity on tracked days", "") +

    function renderProgressDiscipline(name, filter, score, sub, color) {
      return '<button class="card pad row" type="button" data-action="set-filter" data-filter-type="progress" data-value="' + attr(filter) + '" style="text-align:left;">' +
        '<span style="min-width:0;"><span style="display:block;font-size:17px;font-weight:900;">' + esc(name) + '</span><span class="subtext">' + esc(sub) + '</span></span>' +
        '<span class="badge ' + color + '" style="font-size:15px;min-width:58px;min-height:38px;">' + esc(score) + '%</span>' +
      '</button>';
    }

    function progressTitle(filter) {
      if (filter === "lift") return "Weight training sessions";
      if (filter === "bjj") return "BJJ work";
      if (filter === "muay") return "Muay Thai work";
      if (filter === "soccer") return "Soccer work";
      return "Recent sessions";
    }

    function progressSessions(filter) {
      var normal = state.sessions.slice();
      var soccer = state.soccerSessions.map(function (s) {
        return { id: s.id, date: s.date, name: "Soccer - " + s.name, type: "Soccer", duration: s.minutes, volume: 0, notes: s.notes || "" };
      });
      if (filter === "lift") return normal.filter(function (s) { return s.type === "Lift"; });
      if (filter === "bjj") return normal.filter(function (s) { return s.type === "Combat" && !isMuaySession(s); });
      if (filter === "muay") return normal.filter(function (s) { return s.type === "Combat" && isMuaySession(s); });
      if (filter === "soccer") return soccer;
      return normal.concat(soccer).sort(function (a, b) { return String(b.date).localeCompare(String(a.date)); });
    }

    function isMuaySession(session) {
      var hay = (session.name + " " + JSON.stringify(session.exercises || [])).toLowerCase();
      return hay.indexOf("muay") >= 0 || hay.indexOf("shadow") >= 0 || hay.indexOf("kick") >= 0 || hay.indexOf("teep") >= 0 || hay.indexOf("clinch") >= 0;
    }

    function weightReadiness() {
      var recent = state.sessions.filter(function (s) { return s.type === "Lift" && lastNDays(14).indexOf(s.date) >= 0; }).length;
      return clamp(Math.round(recent / 8 * 100), 0, 100);
    }

    function soccerReadiness() {
      var minutes = state.soccerSessions.filter(function (s) { return lastNDays(14).indexOf(s.date) >= 0; }).reduce(function (sum, s) { return sum + num(s.minutes); }, 0);
      var drillScore = state.soccerDrills.filter(function (d) { return num(d.minutes) >= 30; }).length / Math.max(1, state.soccerDrills.length) * 40;
      return clamp(Math.round(minutes / 180 * 60 + drillScore), 0, 100);
    }

    function soccerReadinessText() {
      var mins = state.soccerSessions.filter(function (s) { return lastNDays(14).indexOf(s.date) >= 0; }).reduce(function (sum, s) { return sum + num(s.minutes); }, 0);
      return mins + " minutes in the last 14 days.";
    }

    function overallReadiness() {
      return Math.round((weightReadiness() + bjjReadiness().score + muayThaiReadiness().score + soccerReadiness()) / 4);

    function totalSkillReps(type) {

      var first = sorted[0][key];
      var last = sorted[sorted.length - 1][key];

    function renderSpark(key, color) {
      var vals = state.measurements.map(function (m) { return num(m[key], null); }).filter(function (v) { return v != null && Number.isFinite(v); });

      var min = Math.min.apply(null, vals);

      var span = max - min || 1;
      var points = vals.map(function (v, i) {
        var x = vals.length === 1 ? 0 : i / (vals.length - 1) * 120;
        var y = 34 - ((v - min) / span * 27 + 3);
        return round(x, 1) + "," + round(y, 1);
      }).join(" ");
      return '<svg class="sparkline" viewBox="0 0 120 40" preserveAspectRatio="none" aria-hidden="true"><polyline points="' + points + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    function saveQuick(data) {
      var rec = dayRecord(data.date || todayKey());

        var date = data.date || todayKey();
        var existing = state.measurements.find(function (m) { return m.date === date; });
        if (!existing) {
          existing = { date: date };
          state.measurements.push(existing);

        if (data.bodyFat !== "") existing.bodyFat = num(data.bodyFat);

    function repValueForSet(reps, index) {
      var text = String(reps || "");
      if (text.indexOf("/") >= 0) {
        var parts = text.split("/").map(function (p) { return p.trim(); });
        return parts[index] || parts[parts.length - 1] || "";
      }
      var range = text.match(/(\d+)\s*-\s*(\d+)/);
      if (range) return range[2];
      var single = text.match(/\d+/);
      return single ? single[0] : text;
    }

    function saveSession(data, templateId) {
      var t = state.templates.find(function (x) { return x.id === templateId; });

      for (var i = 0; i < count; i++) {
        var name = data["name_" + i];
        var phase = data["phase_" + i] || "Main Work";
        var setCount = num(data["setcount_" + i], 1);
        var setLogs = [];
        for (var s = 0; s < setCount; s++) {
          if (data["done_" + i + "_" + s] !== "1") continue;
          var reps = data["reps_" + i + "_" + s] || "";
          var weight = num(data["weight_" + i + "_" + s]);
          var repNumber = num(reps);
          volume += repNumber * weight;
          setLogs.push({ set: s + 1, reps: reps, weight: weight });
          if (weight > 0) updatePR(name, weight, "lb", data.date || todayKey());
        }
        if (!setLogs.length) continue;
        exercises.push({
          name: name,
          phase: phase,
          sets: setLogs.length,
          reps: setLogs.map(function (set) { return set.reps; }).join(", "),
          weight: Math.max.apply(null, setLogs.map(function (set) { return num(set.weight); })),
          setLogs: setLogs
        });

      var session = {
        id: uid("session"),

        name: t.name,

        duration: num(data.duration, t.duration),
        notes: data.notes || "",
        exercises: exercises,
        volume: volume
      };
      state.sessions.unshift(session);

    function openProfile() {
      var p = state.profile;
      var body = field("Name", "name", p.name) + '<div class="field-row">' + field("Initials", "initials", p.initials) + field("Age", "age", p.age) + '</div>' +
        '<div class="field-row">' + field("Height", "height", p.height) + field("Belt / level", "belt", p.belt) + '</div>' +
        '<div class="field-row">' + field("Goal weight", "goalWeight", p.goalWeight, "number", 'step="0.5"') + field("Body fat goal", "bodyFatGoal", p.bodyFatGoal, "number", 'step="0.1"') + '</div>' +
        area("Training note", "note", p.note);
      openModal("Edit profile", body, null, 'data-form="profile"');
    }
    function saveProfile(data) {
      state.profile.name = data.name || state.profile.name;
      state.profile.initials = data.initials || initials(data.name || state.profile.name);
      state.profile.age = data.age || "";
      state.profile.height = data.height || "";
      state.profile.belt = data.belt || "";
      state.profile.goalWeight = num(data.goalWeight, state.profile.goalWeight);
      state.profile.bodyFatGoal = num(data.bodyFatGoal, state.profile.bodyFatGoal);
      state.profile.note = data.note || "";
      persist(); closeModal(); render();
    }

    function exportData() {
      var payload = JSON.stringify(state, null, 2);
      var blob = new Blob([payload], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "kaya-backup-" + todayKey() + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    }
    function confirmReset() {
      var body = '<p class="body-copy">This erases KAYA data from this browser on this phone. Export first if you want a backup.</p>' + field('Type RESET to confirm', 'confirm', '');
      openModal("Reset KAYA", body, { html: '<button class="btn ghost" type="button" data-action="close-modal">Cancel</button><button class="btn danger" type="submit">' + icon("trash") + 'Reset</button>' }, 'data-form="reset"');
    }
    function resetApp(data) {
      if (String(data.confirm || "").trim().toUpperCase() !== "RESET") return;
      try { localStorage.removeItem(STORAGE_KEY); } catch (err) {}
      state = defaultState();
      persist();
      closeModal();
      render();
    }
    function confirmResetProgress() {
      var body = '<p class="body-copy">This clears workout sessions, soccer sessions, PRs, body measurements, skill points, and drill minutes. It keeps your app setup, templates, targets, profile, and photos.</p>' + field('Type PROGRESS to confirm', 'confirm', '');
      openModal("Reset Progress", body, { html: '<button class="btn ghost" type="button" data-action="close-modal">Cancel</button><button class="btn danger" type="submit">' + icon("trash") + 'Reset Progress</button>' }, 'data-form="reset-progress"');
    }
    function resetProgress(data) {
      if (String(data.confirm || "").trim().toUpperCase() !== "PROGRESS") return;
      state.sessions = [];
      state.soccerSessions = [];
      state.measurements = [];
      state.prs = {};
      [state.principles, state.combatives, state.muayThaiPrinciples, state.muayThaiTechniques].forEach(function (list) {
        list.forEach(function (item) { item.reps = 0; });
      });
      state.soccerDrills.forEach(function (drill) { drill.minutes = 0; });
      Object.keys(state.days || {}).forEach(function (date) {
        var rec = state.days[date];
        rec.skillReps = 0;
        rec.muayThaiReps = 0;
        rec.soccerMinutes = 0;
        rec.completedTemplates = [];
        rec.skillLog = {};
      });
      persist();
      closeModal();
      render();
    }

    render();
  })();
  </script>
</body>
</html>
