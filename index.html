<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,viewport-fit=cover,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KAYA">
<meta name="theme-color" content="#000000">
<title>KAYA</title>
<style>
:root{
  --bg:#000;--bg-e:#1C1C1E;--bg-c:#2C2C2E;--sep:#38383A;
  --l:#fff;--l2:rgba(235,235,245,.6);--l3:rgba(235,235,245,.3);
  --accent:#0A84FF;--accent-d:#0060D0;
  --move-a:#FA114F;--move-b:#FF6482;--move-t:rgba(250,17,79,.25);
  --train-a:#92E82A;--train-b:#C0FF00;--train-t:rgba(146,232,42,.25);
  --skill-a:#1EEAEF;--skill-b:#00B0FF;--skill-t:rgba(30,234,239,.25);
  --gold:#FFD60A;--red:#FF3B30;--green:#30D158;--orange:#FF9F0A;
  --tab-h:56px;--nav-h:52px;
  font-size:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;width:100%;background:var(--bg);color:var(--l);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;overflow:hidden;overscroll-behavior-y:contain}
#app{display:flex;flex-direction:column;height:100%;width:100%;position:fixed;top:0;left:0}
#view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding-top:calc(var(--nav-h) + env(safe-area-inset-top));padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 8px)}
.nav-bar{position:fixed;top:0;left:0;right:0;z-index:100;height:calc(var(--nav-h) + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);display:flex;align-items:center;padding-left:20px;padding-right:20px;background:rgba(0,0,0,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-bar h1{font-size:17px;font-weight:700;letter-spacing:.3px;flex:1;text-align:center}
.nav-btn{background:none;border:none;color:var(--accent);font-size:15px;font-weight:500;padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:10px}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:calc(var(--tab-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);display:flex;align-items:flex-start;padding-top:4px;background:rgba(0,0,0,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--sep)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;background:none;border:none;color:var(--l3);cursor:pointer;font-size:10px;font-weight:500;min-height:44px;transition:color .15s}
.tab-item.active{color:var(--accent)}
.tab-item svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab-item.active svg{stroke:var(--accent)}
/* Cards */
.card{background:var(--bg-e);border-radius:18px;padding:16px;margin:0 16px 12px}
.card-sm{background:var(--bg-c);border-radius:14px;padding:14px}
.card-label{font-size:12px;font-weight:600;color:var(--l2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
/* Section header */
.section-h{font-size:22px;font-weight:700;margin:20px 16px 8px}
.section-sub{font-size:13px;color:var(--l2);margin:0 16px 16px}
/* Rings */
.rings-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0 0}
#rings-svg{width:200px;height:200px}
.ring-labels{display:flex;gap:24px;padding:12px 0 8px}
.ring-lbl{display:flex;flex-direction:column;align-items:center;gap:3px}
.ring-lbl-dot{width:8px;height:8px;border-radius:50%}
.ring-lbl-name{font-size:10px;font-weight:600;color:var(--l2);text-transform:uppercase;letter-spacing:.6px}
.ring-lbl-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
/* Streak */
.streak-row{display:flex;align-items:center;gap:8px;padding:0 16px 4px}
.streak-num{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.streak-fire{font-size:28px}
.streak-lbl{font-size:12px;color:var(--l2);font-weight:500}
/* Today card */
.today-card{background:var(--bg-e);border-radius:20px;margin:0 16px 12px;overflow:hidden}
.today-card-header{padding:16px 16px 12px;display:flex;flex-direction:column;gap:4px}
.today-daytype{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px}
.today-title{font-size:20px;font-weight:700}
.today-meta{font-size:13px;color:var(--l2)}
.today-exercises{padding:0 16px 12px;display:flex;flex-direction:column;gap:6px}
.today-ex-row{display:flex;align-items:center;gap:10px}
.today-ex-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.today-ex-name{font-size:14px;color:var(--l2)}
.today-ex-scheme{font-size:12px;color:var(--l3);margin-left:auto}
.start-btn{margin:0 16px 0;padding:16px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:700;width:calc(100% - 32px);cursor:pointer;transition:opacity .15s;min-height:52px}
.start-btn:active{opacity:.8}
.start-btn.combat{background:linear-gradient(135deg,var(--move-a),var(--skill-a))}
.start-btn.recovery{background:var(--bg-c);color:var(--l2)}
/* Metric grid */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 12px}
.metric-card{background:var(--bg-e);border-radius:16px;padding:14px}
.metric-card.accent{border:1px solid rgba(10,132,255,.25)}
.metric-icon{font-size:18px;margin-bottom:6px}
.metric-val{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
.metric-unit{font-size:12px;color:var(--l2)}
.metric-label{font-size:12px;color:var(--l2);margin-top:2px}
.metric-sub{font-size:11px;color:var(--l3)}
/* Quick action row */
.quick-row{display:flex;gap:10px;padding:0 16px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.quick-row::-webkit-scrollbar{display:none}
.quick-btn{flex-shrink:0;background:var(--bg-e);border:none;border-radius:12px;padding:10px 16px;color:var(--l);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;min-height:44px;white-space:nowrap}
.quick-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
/* Badges shelf */
.badges-shelf{display:flex;gap:10px;padding:0 16px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.badges-shelf::-webkit-scrollbar{display:none}
.badge-chip{flex-shrink:0;background:var(--bg-e);border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:6px;min-height:44px}
.badge-icon{font-size:18px}
.badge-name{font-size:12px;font-weight:600;color:var(--l2);white-space:nowrap}
/* Sub-tab bar */
.sub-tabs{display:flex;overflow-x:auto;padding:0 16px;gap:8px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{flex-shrink:0;background:var(--bg-c);border:none;border-radius:20px;padding:8px 16px;color:var(--l2);font-size:14px;font-weight:600;cursor:pointer;min-height:36px;transition:all .15s}
.sub-tab.active{background:var(--accent);color:#fff}
/* Exercise cards in train tab */
.ex-library-card{background:var(--bg-e);border-radius:16px;margin:0 16px 10px;overflow:hidden}
.ex-lib-header{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer}
.ex-lib-fig{width:48px;height:60px;flex-shrink:0}
.ex-lib-info{flex:1}
.ex-lib-name{font-size:16px;font-weight:600;margin-bottom:2px}
.ex-lib-muscles{font-size:12px;color:var(--l2)}
.ex-lib-role{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:3px 8px;border-radius:8px;background:var(--bg-c);color:var(--l3)}
/* Set logger */
.sets-table{padding:0 16px 14px}
.sets-head{display:grid;grid-template-columns:22px 28px 1fr 84px 64px 40px;gap:3px;align-items:center;padding:0 0 6px;border-bottom:1px solid var(--sep);margin-bottom:6px}
.sets-head span{font-size:10px;font-weight:600;color:var(--l3);text-transform:uppercase;text-align:center}
.sets-head span:nth-child(3){text-align:left}
.set-row{display:grid;grid-template-columns:22px 28px 1fr 84px 64px 40px;gap:3px;align-items:center;padding:4px 0;border-radius:10px;transition:background .15s}
.set-row.active{background:rgba(10,132,255,.1)}
.set-row.done{background:rgba(48,209,88,.08)}
.set-num{font-size:13px;color:var(--l2);text-align:center;font-variant-numeric:tabular-nums}
.set-type-badge{font-size:10px;font-weight:700;text-align:center;padding:3px 4px;border-radius:6px;text-transform:uppercase}
.set-type-badge.warmup{background:rgba(255,159,10,.15);color:var(--orange)}
.set-type-badge.work{background:rgba(48,209,88,.15);color:var(--green)}
.set-type-badge.back{background:rgba(10,132,255,.15);color:var(--accent)}
.set-type-badge.drop{background:rgba(255,59,48,.15);color:var(--red)}
.set-prev{font-size:12px;color:var(--l3);text-align:left}
.stepper{display:flex;align-items:center;background:var(--bg-c);border-radius:10px;overflow:hidden;width:100%}
.stepper-btn{width:22px;height:36px;background:none;border:none;color:var(--accent);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stepper-inp{flex:1;min-width:0;background:none;border:none;color:var(--l);font-size:14px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;height:36px;padding:0}
.reps-stepper{display:flex;align-items:center;background:var(--bg-c);border-radius:10px;overflow:hidden;width:100%}
.check-btn{width:44px;height:44px;border-radius:12px;border:2px solid var(--sep);background:none;color:var(--l2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.check-btn.done{background:var(--green);border-color:var(--green);color:#fff}
/* Workout sheet */
.sheet{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:var(--bg);transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;overflow:hidden}
.sheet.open{transform:translateY(0)}
.sheet-nav{display:flex;align-items:center;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;gap:12px;background:rgba(0,0,0,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0}
.sheet-close{width:44px;height:44px;border-radius:12px;background:var(--bg-c);border:none;color:var(--l);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-title{flex:1;font-size:16px;font-weight:700;text-align:center}
.sheet-meta{font-size:13px;color:var(--l2);text-align:right;min-width:60px}
.sheet-progress-bar{height:3px;background:var(--bg-c);flex-shrink:0}
.sheet-progress-fill{height:100%;background:linear-gradient(90deg,var(--train-a),var(--train-b));transition:width .3s}
.sheet-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:120px}
.workout-ex-card{margin:12px 16px;background:var(--bg-e);border-radius:18px;overflow:hidden}
.workout-ex-header{display:flex;align-items:center;padding:14px 16px 10px;gap:12px}
.workout-ex-fig{width:44px;height:54px;flex-shrink:0;opacity:.85}
.workout-ex-info{flex:1}
.workout-ex-role{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin-bottom:2px}
.workout-ex-name{font-size:17px;font-weight:700}
.workout-ex-prev{font-size:12px;color:var(--l3);margin-top:1px}
.workout-ex-cue{padding:0 16px 10px;font-size:13px;color:var(--l2);font-style:italic}
.workout-sets{padding:0 12px 14px}
/* Rest timer */
.rest-bar{position:absolute;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 64px);left:16px;right:16px;background:var(--bg-e);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);transform:translateY(0);z-index:10;transition:opacity .2s}
.rest-bar.hidden{opacity:0;pointer-events:none}
.rest-label{font-size:12px;font-weight:600;color:var(--l2);text-transform:uppercase;letter-spacing:.6px}
.rest-count{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;min-width:44px;text-align:center}
.rest-track{flex:1;height:4px;background:var(--sep);border-radius:2px;overflow:hidden}
.rest-fill{height:100%;background:linear-gradient(90deg,var(--train-a),var(--train-b));border-radius:2px;transition:width .5s linear}
.rest-skip{background:var(--bg-c);border:none;border-radius:10px;padding:8px 14px;color:var(--l2);font-size:13px;font-weight:600;cursor:pointer;min-height:36px}
/* Finish bar */
.finish-bar{position:absolute;bottom:0;left:0;right:0;padding:12px 16px calc(env(safe-area-inset-bottom) + 12px);background:rgba(0,0,0,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--sep);display:flex;gap:10px;z-index:9}
.finish-btn{flex:1;padding:16px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;min-height:52px}
.elapsed-badge{background:var(--bg-c);border-radius:12px;padding:0 14px;font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;display:flex;align-items:center;color:var(--l2)}
/* Summary screen */
.summary{padding:24px 16px;display:flex;flex-direction:column;gap:16px}
.summary-hero{text-align:center;padding:20px 0}
.summary-emoji{font-size:56px;margin-bottom:8px}
.summary-title{font-size:28px;font-weight:800;margin-bottom:6px}
.summary-sub{font-size:15px;color:var(--l2)}
.summary-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat-box{background:var(--bg-c);border-radius:14px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:11px;color:var(--l2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.pr-badge{background:linear-gradient(135deg,var(--gold),var(--orange));border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
/* History */
.heatmap-wrap{padding:0 16px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.heatmap-wrap::-webkit-scrollbar{display:none}
.session-log-item{background:var(--bg-e);border-radius:14px;margin:0 16px 10px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.log-date{font-size:13px;font-weight:700;color:var(--l2);min-width:72px}
.log-title{flex:1;font-size:15px;font-weight:600}
.log-duration{font-size:13px;color:var(--l3)}
.chart-wrap{background:var(--bg-e);border-radius:16px;margin:0 16px 12px;padding:16px;overflow:hidden}
.chart-title{font-size:14px;font-weight:600;color:var(--l2);margin-bottom:12px}
/* BJJ */
.combatives-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:0 16px 16px}
.comb-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .15s;background:var(--bg-c)}
.comb-cell .lesson-num{font-size:10px;font-weight:700;color:var(--l3)}
.comb-cell .reps-dots{display:flex;gap:2px}
.comb-cell .dot{width:5px;height:5px;border-radius:50%;background:var(--sep)}
.comb-cell[data-reps="1"] .dot:nth-child(1){background:var(--orange)}
.comb-cell[data-reps="2"] .dot:nth-child(-n+2){background:var(--orange)}
.comb-cell[data-reps="3"] .dot{background:var(--green)!important}
.comb-cell[data-mastered="true"]{background:rgba(48,209,88,.15)}
.principle-item{background:var(--bg-e);border-radius:14px;margin:0 16px 8px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px}
.principle-num{font-size:13px;font-weight:700;color:var(--l3);min-width:24px}
.principle-info{flex:1}
.principle-name{font-size:15px;font-weight:600;margin-bottom:2px}
.principle-desc{font-size:12px;color:var(--l2)}
.principle-tag{font-size:10px;padding:3px 8px;border-radius:8px;font-weight:600;flex-shrink:0}
.principle-tag.solo{background:rgba(30,234,239,.15);color:var(--skill-a)}
.principle-tag.partner{background:rgba(255,59,48,.15);color:var(--red)}
.studied-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--sep);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.studied-check.done{background:var(--green);border-color:var(--green);color:#fff}
/* MT */
.mt-category{margin-bottom:20px}
.mt-cat-header{font-size:15px;font-weight:700;color:var(--l2);padding:0 16px 8px;text-transform:uppercase;letter-spacing:.6px}
.mt-item{background:var(--bg-e);border-radius:12px;margin:0 16px 6px;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.mt-item-name{flex:1;font-size:15px;font-weight:500}
.mt-solo-tag{font-size:10px;padding:3px 8px;border-radius:8px;font-weight:600;background:rgba(30,234,239,.12);color:var(--skill-a);flex-shrink:0}
.mt-partner-tag{font-size:10px;padding:3px 8px;border-radius:8px;font-weight:600;background:rgba(255,59,48,.1);color:var(--red);flex-shrink:0}
.sn-dots{display:flex;gap:3px;flex-shrink:0}
.sn-dot{width:8px;height:8px;border-radius:50%;background:var(--sep)}
.sn-dot.filled{background:var(--skill-a)}
/* Skills tab */
.skills-ring-row{display:flex;gap:16px;padding:0 16px 20px;justify-content:center}
.skill-ring-card{flex:1;max-width:160px;background:var(--bg-e);border-radius:18px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px}
.ring-mini-svg{width:80px;height:80px}
.skill-ring-title{font-size:13px;font-weight:700;text-align:center;color:var(--l2)}
.skill-ring-pct{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
/* Badges gallery */
.badges-gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 20px}
.badge-card{background:var(--bg-e);border-radius:16px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;opacity:.4}
.badge-card.earned{opacity:1;border:1px solid rgba(255,214,10,.25)}
.badge-icon-lg{font-size:32px}
.badge-name-lg{font-size:13px;font-weight:600}
.badge-date{font-size:11px;color:var(--l2)}
/* Profile */
.profile-header{display:flex;align-items:center;gap:14px;padding:0 16px 20px}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--skill-a));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;flex-shrink:0}
.profile-name{font-size:22px;font-weight:800}
.profile-sub{font-size:14px;color:var(--l2)}
.settings-group{background:var(--bg-e);border-radius:16px;margin:0 16px 12px;overflow:hidden}
.settings-row{display:flex;align-items:center;padding:14px 16px;gap:12px;min-height:52px;border-bottom:1px solid var(--sep)}
.settings-row:last-child{border-bottom:none}
.settings-row-icon{font-size:18px;width:28px;text-align:center}
.settings-row-label{flex:1;font-size:16px}
.settings-row-value{font-size:15px;color:var(--l2)}
.settings-row-arrow{font-size:14px;color:var(--l3);margin-left:4px}
.toggle{width:52px;height:32px;border-radius:16px;background:var(--sep);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:#32D74B}
.toggle::after{content:'';position:absolute;width:26px;height:26px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(20px)}
/* Nutrition quick-log */
.nutrition-bars{background:var(--bg-e);border-radius:16px;margin:0 16px 12px;padding:16px}
.nut-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.nut-row:last-child{margin-bottom:0}
.nut-lbl{font-size:13px;font-weight:600;width:70px;flex-shrink:0}
.nut-track{flex:1;height:6px;background:var(--sep);border-radius:3px;overflow:hidden}
.nut-fill{height:100%;border-radius:3px;transition:width .5s}
.nut-val{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;min-width:80px;text-align:right;color:var(--l2)}
/* Modal overlay for quick-log */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;background:rgba(0,0,0,.7);display:flex;align-items:flex-end}
.modal-bg.hidden{display:none}
.modal-sheet{width:100%;background:var(--bg-e);border-radius:20px 20px 0 0;padding:20px 20px calc(env(safe-area-inset-bottom)+20px);display:flex;flex-direction:column;gap:14px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:20px;font-weight:700;margin-bottom:4px}
.input-row{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:13px;font-weight:600;color:var(--l2)}
.big-input{background:var(--bg-c);border:none;border-radius:12px;padding:14px 16px;color:var(--l);font-size:16px;font-family:inherit;width:100%;outline:none;-webkit-appearance:none}
.modal-btn-row{display:flex;gap:10px;margin-top:4px}
.modal-cancel{flex:1;padding:14px;background:var(--bg-c);border:none;border-radius:12px;color:var(--l2);font-size:16px;font-weight:600;cursor:pointer}
.modal-save{flex:1;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
/* Celebration */
.celebration{position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;display:flex;align-items:center;justify-content:center;pointer-events:none}
.celebration-card{background:var(--bg-e);border-radius:24px;padding:32px 40px;text-align:center;transform:scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.celebration-card.show{transform:scale(1)}
.celebration-emoji{font-size:64px;margin-bottom:12px}
.celebration-text{font-size:24px;font-weight:800;margin-bottom:6px}
.celebration-sub{font-size:15px;color:var(--l2)}
/* SVG figure style */
.fig svg{display:block}
/* Date header on dashboard */
.dash-date{font-size:14px;font-weight:600;color:var(--l2);text-align:center;padding:8px 0 4px}
/* Plate calc */
.plate-calc{background:var(--bg-c);border-radius:12px;padding:12px 16px;margin:0 16px;font-size:14px;color:var(--l2)}
.plate-calc .pc-res{font-size:16px;font-weight:700;color:var(--l);margin-top:6px}
/* Reflex dev counter */
.reflex-card{background:var(--bg-e);border-radius:16px;margin:0 16px 12px;padding:16px;display:flex;align-items:center;gap:14px}
.reflex-circle{width:64px;height:64px;border-radius:50%;border:3px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.reflex-count{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.reflex-of{font-size:9px;color:var(--l3)}
/* BJJ drill cards */
.drill-item{background:var(--bg-e);border-radius:12px;margin:0 16px 8px;padding:12px 16px;display:flex;align-items:center;gap:10px}
.drill-name{flex:1;font-size:15px;font-weight:500}
.drill-done-btn{background:var(--bg-c);border:1px solid var(--sep);border-radius:10px;color:var(--l2);font-size:12px;font-weight:600;padding:6px 12px;cursor:pointer;min-height:36px}
.drill-done-btn.done{background:rgba(48,209,88,.15);border-color:rgba(48,209,88,.3);color:var(--green)}
/* Mobility */
.mobility-item{background:var(--bg-e);border-radius:12px;margin:0 16px 8px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.mobility-timer-btn{background:var(--accent);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;min-height:36px}
/* Chart SVG */
.chart-svg{width:100%;overflow:visible}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-in{animation:fadeIn .3s ease both}
.pop-in{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}
.ring-progress{transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
@media(prefers-reduced-motion:reduce){.ring-progress{transition:none}*{animation:none!important;transition:none!important}}
</style>
</head>

<div class="sheet" id="workout-sheet">

  <div class="finish-bar">

    <button class="finish-btn" onclick="finishWorkout()">Finish Workout</button>
  </div>
</div>
<!-- Detail sheet -->
<div class="sheet" id="detail-sheet">
  <div class="sheet-nav">
    <button class="sheet-close" onclick="closeDetail()">✕</button>
    <div class="sheet-title" id="ds-title"></div>
    <div style="width:44px"></div>
  </div>
  <div class="sheet-scroll" id="ds-content"></div>
</div>
<!-- Quick-log modal -->
<div class="modal-bg hidden" id="modal-bg" onclick="closeModal(event)">
  <div class="modal-sheet" id="modal-sheet"></div>
</div>
<!-- Celebration -->
<div class="celebration" id="celebration">

    <div class="celebration-sub" id="cel-sub"></div>
  </div>

function migrate(db){db.schemaVersion=SCHEMA_VER;return db;}

function loadDB(){
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(!raw){DB=seedDefault();saveDB();return;}
    DB=JSON.parse(raw);
    if(!DB.schemaVersion||DB.schemaVersion<SCHEMA_VER){DB=migrate(DB);saveDB();}
    // Fill in any missing fields from seed
    if(!DB.skills.soloDrills) DB.skills.soloDrills=BJJ_SOLO_DRILLS.map(d=>({...d,lastDone:null}));
    if(!DB.activeWorkoutDraft) DB.activeWorkoutDraft=null;
  }catch(e){console.warn('DB load error',e);DB=seedDefault();}
}

function saveDB(){
  try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}
  catch(e){if(e.name==='QuotaExceededError')alert('Storage full. Export your data to free space.');}
}

function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`kaya-backup-${todayStr()}.json`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
}

function copyDataToClipboard(){
  navigator.clipboard.writeText(JSON.stringify(DB,null,2))
    .then(()=>showToast('Copied to clipboard'))
    .catch(()=>showToast('Copy failed — use Export instead'));
}

function importData(json){
  try{
    const parsed=JSON.parse(json);
    if(!parsed.schemaVersion)throw new Error('Invalid backup');
    DB=parsed;saveDB();
    showToast('Data imported!');
    renderTab(currentTab);
  }catch(e){alert('Import failed: '+e.message);}
}

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().split('T')[0];}
function dateStr(d){return d.toISOString().split('T')[0];}

function fmtDate(s){
  const d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function fmtDuration(ms){
  const m=Math.floor(ms/60000);
  const s=Math.floor((ms%60000)/1000);
  return `${m}:${String(s).padStart(2,'0')}`;
}

function fmtSecs(s){
  const m=Math.floor(s/60);
  const sec=s%60;
  return m>0?`${m}:${String(sec).padStart(2,'0')}`:`${sec}s`;
}

function e1RM(w,r){
  if(r===1)return w;
  return Math.round(w*(1+r/30));
}

function calcPlates(targetLb,barLb=45){
  const perSide=(targetLb-barLb)/2;
  if(perSide<=0)return[];
  const plates=[45,35,25,10,5,2.5];
  let rem=perSide;
  const result=[];
  plates.forEach(p=>{while(rem>=p-0.01){result.push(p);rem-=p;}});
  return result;
}

function getTodayDayType(){
  const day=new Date().getDay();// 0=Sun...6=Sat
  const idx=day===0?6:day-1;// Mon=0...Sun=6
  return DB.program.rotation[idx];
}

function getExById(id){return DB.exerciseLibrary.find(e=>e.id===id)||EXERCISES.find(e=>e.id===id);}

function getLastLog(dayTypeId){
  return [...DB.logs].reverse().find(l=>l.dayTypeId===dayTypeId&&l.completed);
}

function getTodayLog(){
  const today=todayStr();
  return DB.logs.find(l=>l.date===today);
}

function getTodayNutrition(){
  return DB.nutritionLogs.find(l=>l.date===todayStr());
}

function showToast(msg,dur=2000){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:calc(env(safe-area-inset-bottom)+80px);left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._timeout);
  t._timeout=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},dur);
}

// ─── GAMIFICATION ─────────────────────────────────────────────────────────────
function updateStreak(){
  const today=todayStr();
  const streak=DB.streak;
  if(streak.lastDate===today)return;
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yStr=dateStr(yesterday);
  if(streak.lastDate===yStr){
    streak.count++;
  } else if(streak.lastDate&&streak.lastDate<yStr){
    // Missed day — check freeze
    if(streak.freezesLeft>0&&streak.count>0){
      streak.freezesLeft--;
      streak.count++;
      showToast('❄️ Streak freeze used!',3000);
    } else {
      streak.count=1;
      streak.freezesLeft=Math.min(1,streak.freezesLeft+1);
    }
  } else if(!streak.lastDate){
    streak.count=1;
  }
  streak.best=Math.max(streak.best,streak.count);
  streak.lastDate=today;
  saveDB();
  checkBadges();
}

function checkBadges(){
  const earned=DB.badges.map(b=>b.id);
  const add=(id,name,icon)=>{
    if(!earned.includes(id)){
      DB.badges.push({id,name,icon,earnedDate:todayStr()});
      showCelebration(icon,name,'Badge unlocked!');
    }
  };
  const totalSessions=DB.logs.filter(l=>l.completed).length;
  if(totalSessions>=1)add('first','First Session','🌱');
  if(totalSessions>=10)add('s10','10 Sessions','🔟');
  if(totalSessions>=50)add('s50','50 Sessions','💥');
  if(totalSessions>=100)add('s100','Century','💯');
  if(DB.streak.count>=7)add('str7','7-Day Streak','🔥');
  if(DB.streak.count>=30)add('str30','30-Day Streak','🌋');
  if(DB.streak.count>=90)add('str90','90-Day Streak','💎');
  const mastered=DB.skills.combatives.filter(c=>c.mastered).length;
  if(mastered===36)add('gcall','Combatives Complete','🥋');
  const studied=DB.skills.principles.filter(p=>p.studied).length;
  if(studied===32)add('pall','All Principles','📖');
  if(DB.skills.reflexDevCount>=12)add('reflex12','Reflex Dev. 12','🤸');
  const today=todayStr();
  const rv=getRingValues();
  if(rv.move>=100&&rv.train>=100&&rv.skill>=100)add('skills','All Rings Closed','⭕');
  const metrics=DB.bodyMetrics;
  if(metrics.length>=2){
    const first=metrics[0].waistIn,last=metrics[metrics.length-1].waistIn;
    if(first&&last&&(first-last)>=1)add('waist1','Waist Down 1"','📏');
  }
  saveDB();
}

let _celTimeout=null;
function showCelebration(emoji,title,sub){
  const el=document.getElementById('cel-card');
  document.getElementById('cel-emoji').textContent=emoji;
  document.getElementById('cel-text').textContent=title;
  document.getElementById('cel-sub').textContent=sub;
  el.classList.add('show');
  clearTimeout(_celTimeout);
  _celTimeout=setTimeout(()=>el.classList.remove('show'),2800);
}

function getRingValues(){
  const today=todayStr();
  const todayLog=DB.logs.find(l=>l.date===today);
  const move=!!(todayLog||DB.nutritionLogs.find(l=>l.date===today)||DB.bodyMetrics.find(l=>l.date===today))?100:0;
  const train=!!(todayLog&&todayLog.completed)?100:0;
  const skillDrilled=DB.skills.combatives.some(c=>c.lastDrilled===today)||
    DB.skills.muaythai.some(m=>m.lastDrilled===today)||
    DB.skills.principles.some(p=>p.lastStudied===today)||
    DB.skills.soloDrills.some(d=>d.lastDone===today);
  const skill=skillDrilled?100:0;
  return{move,train,skill};
}

function animateRings(rv){
  const rings=[
    {id:'ring-move',r:88,circ:553,pct:rv.move},
    {id:'ring-train',r:68,circ:427,pct:rv.train},
    {id:'ring-skill',r:48,circ:302,pct:rv.skill},
  ];
  rings.forEach(({id,circ,pct})=>{
    const el=document.getElementById(id);
    if(!el)return;
    const offset=circ*(1-Math.min(pct,100)/100);
    el.style.transition='none';
    el.style.strokeDashoffset=circ;
    el.getBoundingClientRect();
    el.style.transition='stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1)';
    el.style.strokeDashoffset=offset;
  });
}

let activeWorkout=null;
let elapsedInterval=null;
let restTimerInterval=null;

function buildDefaultSets(ex){
  const base=ex.defaultW||0;
  return (ex.defaultSets||[{t:'work',reps:10}]).map(s=>({
    type:s.t||'work',
    w:s.wMult?Math.round(base*s.wMult/5)*5:base,
    reps:s.reps||10,
    isTime:!!s.isTime,
    isDistance:!!s.isDistance,
    done:false,doneAt:null,rpe:null,
  }));
}

function startWorkout(dayTypeId){
  const dt=DB.program.dayTypes[dayTypeId];
  if(!dt||!dt.exIds||dt.exIds.length===0){showToast('No exercises for this day');return;}
  const lastLog=getLastLog(dayTypeId);
  const exercises=dt.exIds.map(exId=>{
    const ex=getExById(exId);
    if(!ex)return null;
    const sets=buildDefaultSets(ex);
    // Autofill from last session
    if(lastLog){
      const lastEntry=lastLog.entries.find(e=>e.exId===exId);
      if(lastEntry&&lastEntry.sets.length){
        const dones=lastEntry.sets.filter(s=>s.done);
        sets.forEach((s,i)=>{if(dones[i]){s.w=dones[i].w;if(s.type!=='warmup')s.reps=dones[i].reps;}});
      }
    }
    const prevEntry=lastLog?lastLog.entries.find(e=>e.exId===exId):null;
    return{exId,name:ex.name,role:ex.role||'work',poseKey:ex.poseKey||'standing',sets,prevEntry:prevEntry||null,notes:''};
  }).filter(Boolean);

  activeWorkout={dayTypeId,dayTypeName:dt.name,startTime:Date.now(),exercises,completed:false};
  DB.activeWorkoutDraft=activeWorkout;saveDB();
  renderWorkoutSheet();
  document.getElementById('workout-sheet').classList.add('open');
  startElapsedTimer();
}

function startElapsedTimer(){
  clearInterval(elapsedInterval);
  elapsedInterval=setInterval(()=>{
    if(!activeWorkout)return;
    const el=document.getElementById('elapsed-badge');
    if(el)el.textContent=fmtDuration(Date.now()-activeWorkout.startTime);
  },1000);
}

function updatePlateCalc(){
  const t=parseFloat(document.getElementById('pc-weight').value)||0;
  const b=parseFloat(document.getElementById('pc-bar').value)||45;
  if(t<=0){document.getElementById('pc-result').textContent='Enter a target weight above';return;}
  const plates=calcPlates(t,b);
  if(!plates.length){document.getElementById('pc-result').textContent='Just the bar ('+b+' lb)';return;}
  document.getElementById('pc-result').innerHTML=`Each side: <strong>${plates.join(' + ')} lb</strong> = ${plates.reduce((a,b)=>a+b,0)*2+b} lb total`;
}

function getBestSet(sets){
  const done=sets.filter(s=>s.done);
  if(!done.length)return null;
  const works=done.filter(s=>s.type!=='warmup');
  const best=works.length?works[works.length-1]:done[done.length-1];
  return best.w?`${best.w}×${best.reps}`:`BW×${best.reps}`;
}

function adjVal(ei,si,field,delta){
  if(!activeWorkout)return;
  const set=activeWorkout.exercises[ei].sets[si];
  if(field==='w'){
    set.w=Math.max(0,Math.round(((set.w||0)+delta)/2.5)*2.5);
    const inp=document.getElementById(`sv-w-${ei}-${si}`);
    if(inp)inp.value=set.w||'0';
  } else {
    set.reps=Math.max(1,(set.reps||1)+delta);
    const inp=document.getElementById(`sv-r-${ei}-${si}`);
    if(inp)inp.value=set.reps;
  }
  DB.activeWorkoutDraft=activeWorkout;saveDB();
}

function setVal(ei,si,field,val){
  if(!activeWorkout)return;
  const set=activeWorkout.exercises[ei].sets[si];
  if(field==='w')set.w=Math.max(0,parseFloat(val)||0);
  else set.reps=Math.max(1,parseInt(val)||1);
  DB.activeWorkoutDraft=activeWorkout;saveDB();
}

function completeSet(ei,si){
  if(!activeWorkout)return;
  const set=activeWorkout.exercises[ei].sets[si];
  set.done=!set.done;
  set.doneAt=set.done?Date.now():null;
  // Read current input values
  const wInp=document.getElementById(`sv-w-${ei}-${si}`);
  const rInp=document.getElementById(`sv-r-${ei}-${si}`);
  if(wInp)set.w=parseFloat(wInp.value)||0;
  if(rInp)set.reps=parseInt(rInp.value)||1;
  DB.activeWorkoutDraft=activeWorkout;saveDB();
  // Update UI
  const row=document.getElementById(`sr-${ei}-${si}`);
  const btn=document.getElementById(`cb-${ei}-${si}`);
  if(row){row.className='set-row'+(set.done?' done':'');}
  if(btn){btn.className='check-btn'+(set.done?' done':'');btn.textContent=set.done?'✓':'○';}
  // Update progress
  const totalSets=activeWorkout.exercises.reduce((a,ex)=>a+ex.sets.length,0);
  const doneSets=activeWorkout.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.done).length,0);
  document.getElementById('ws-meta').textContent=`${doneSets}/${totalSets} sets`;
  document.getElementById('ws-prog').style.width=`${doneSets/totalSets*100}%`;
  // Start rest timer if set completed
  if(set.done){
    const restSec=DB.settings.restDefaultSec||90;
    startRestTimer(restSec);
  }
}

function toggleVariant(ei){
  const ex=activeWorkout.exercises[ei];
  const exDef=getExById(ex.exId);
  if(!exDef||!exDef.bw)return;
  showToast(`BW: ${exDef.bw.howTo}`,4000);
}

let _restEnd=0,_restTotal=0;
function startRestTimer(secs){
  clearInterval(restTimerInterval);
  _restEnd=Date.now()+secs*1000;_restTotal=secs;
  const bar=document.getElementById('rest-bar');
  if(bar)bar.classList.remove('hidden');
  restTimerInterval=setInterval(()=>{
    const rem=Math.max(0,Math.ceil((_restEnd-Date.now())/1000));
    const pct=rem/_restTotal*100;
    const el=document.getElementById('rest-count');
    const fill=document.getElementById('rest-fill');
    if(el)el.textContent=fmtSecs(rem);
    if(fill)fill.style.width=pct+'%';
    if(rem===0){
      clearInterval(restTimerInterval);
      if('vibrate'in navigator)navigator.vibrate([80,40,80]);
      setTimeout(()=>{const b=document.getElementById('rest-bar');if(b)b.classList.add('hidden');},2000);
    }
  },250);
}

function skipRest(){
  clearInterval(restTimerInterval);
  const bar=document.getElementById('rest-bar');
  if(bar)bar.classList.add('hidden');
}

function closeWorkout(){
  if(activeWorkout){
    const doneSets=activeWorkout.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.done).length,0);
    if(doneSets>0&&!confirm('Close workout? Progress is saved as draft.'))return;
  }
  clearInterval(elapsedInterval);clearInterval(restTimerInterval);
  document.getElementById('workout-sheet').classList.remove('open');
}

function finishWorkout(){
  if(!activeWorkout)return;
  clearInterval(elapsedInterval);clearInterval(restTimerInterval);
  activeWorkout.completed=true;
  const duration=Math.round((Date.now()-activeWorkout.startTime)/60000);
  const log={
    date:todayStr(),dayTypeId:activeWorkout.dayTypeId,durationMin:duration,
    entries:activeWorkout.exercises.map(ex=>({exId:ex.exId,sets:ex.sets.filter(s=>s.done)})),
    notes:'',completed:true,
  };
  // Check for PRs
  const prs=[];
  log.entries.forEach(entry=>{
    const ex=getExById(entry.exId);if(!ex)return;
    const workSets=entry.sets.filter(s=>s.type!=='warmup'&&s.w>0&&s.reps>0);
    if(!workSets.length)return;
    const best=Math.max(...workSets.map(s=>e1RM(s.w,s.reps)));
    const lastLog=getLastLog(activeWorkout.dayTypeId);
    if(lastLog){
      const prevEntry=lastLog.entries.find(e=>e.exId===entry.exId);
      if(prevEntry){
        const prevWork=prevEntry.sets.filter(s=>s.type!=='warmup'&&s.w>0&&s.reps>0);
        const prevBest=prevWork.length?Math.max(...prevWork.map(s=>e1RM(s.w,s.reps))):0;
        if(best>prevBest)prs.push(ex.name);
      }
    }
  });
  DB.logs.push(log);
  DB.activeWorkoutDraft=null;
  saveDB();
  updateStreak();
  checkBadges();
  activeWorkout=null;
  document.getElementById('workout-sheet').classList.remove('open');
  // Show summary
  showWorkoutSummary(log,prs,duration);
  if(currentTab==='dashboard')renderDashboard();
}

function showWorkoutSummary(log,prs,duration){
  const totalVol=log.entries.reduce((a,e)=>a+e.sets.reduce((b,s)=>b+(s.w||0)*s.reps,0),0);
  const totalSets=log.entries.reduce((a,e)=>a+e.sets.length,0);
  const modal=document.getElementById('modal-bg');
  const sheet=document.getElementById('modal-sheet');
  sheet.innerHTML=`<div class="summary">
<div class="summary-hero"><div class="summary-emoji">🏁</div><div class="summary-title">Workout Complete!</div><div class="summary-sub">${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div></div>
<div class="summary-stats">
<div class="stat-box"><div class="stat-val">${duration}'</div><div class="stat-lbl">Duration</div></div>
<div class="stat-box"><div class="stat-val">${totalSets}</div><div class="stat-lbl">Sets Done</div></div>
<div class="stat-box"><div class="stat-val">${totalVol>0?Math.round(totalVol/1000)+'k':'—'}</div><div class="stat-lbl">Vol (lb)</div></div>
</div>
${prs.map(p=>`<div class="pr-badge">🏆 New PR — ${p}</div>`).join('')}
<button class="modal-save" onclick="closeModal()">Done</button>
</div>`;
  modal.classList.remove('hidden');
  // Animate rings
  const rv=getRingValues();
  setTimeout(()=>animateRings(rv),300);
}

let shadowRoundInterval=null,shadowRoundPhase=0,shadowRoundTimer=0;
function startShadowRounds(){
  // Show a simple timer UI
  const sheet=document.getElementById('detail-sheet');
  document.getElementById('ds-title').textContent='Shadow Rounds';
  const phases=[
    {label:'Round 1',dur:180,color:'var(--move-a)',hint:'Stance + Footwork + Punches'},
    {label:'Rest',dur:60,color:'var(--bg-c)',hint:'Breathe — shake it out'},
    {label:'Round 2',dur:180,color:'var(--move-a)',hint:'Add Teep + Roundhouse'},
    {label:'Rest',dur:60,color:'var(--bg-c)',hint:'Breathe'},
    {label:'Round 3',dur:180,color:'var(--move-a)',hint:'Freestyle 60-70% power'},
    {label:'Done',dur:0,color:'var(--green)',hint:'Great work! 🥊'},
  ];
  let phase=0,elapsed=0;
  clearInterval(shadowRoundInterval);
  const render=()=>{
    const p=phases[phase];
    const rem=p.dur-elapsed;
    document.getElementById('ds-content').innerHTML=`
<div style="padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:20px;min-height:400px;justify-content:center">
<div style="width:160px;height:160px;border-radius:50%;background:${p.color};display:flex;flex-direction:column;align-items:center;justify-content:center;font-variant-numeric:tabular-nums">
<div style="font-size:42px;font-weight:800">${p.dur?fmtSecs(rem):'✓'}</div>
<div style="font-size:13px;font-weight:600;opacity:.7">${p.label}</div>
</div>
<div style="font-size:17px;font-weight:600;text-align:center">${p.hint}</div>
${p.dur===0?`<button onclick="closeDetail()" style="padding:16px 32px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer">Done</button>`:''}
</div>`;
  };
  render();
  sheet.classList.add('open');
  shadowRoundInterval=setInterval(()=>{
    elapsed++;
    if(elapsed>=phases[phase].dur&&phase<phases.length-1){phase++;elapsed=0;if('vibrate'in navigator)navigator.vibrate([100,50,100]);}
    render();
    if(phase===phases.length-1){clearInterval(shadowRoundInterval);logSkillActivity();}
  },1000);
}

    const count=(hasLog?2:0)+(hasSkill?1:0);

  }
  const cols=Math.ceil(cells.length/7);

    });
    if(points.length>=2){
      h+=`<div class="chart-wrap"><div class="chart-title">${lift.name} — Est. 1RM (lb)</div>${lineSVG(points.map(p=>p.val),points.map(p=>p.date),'var(--train-a)')}</div>`;
    }
  });
  if(!h)h=`<div style="text-align:center;padding:40px 16px;color:var(--l3)"><div style="font-size:40px;margin-bottom:10px">📈</div><div>Complete a few sessions to see strength charts</div></div>`;
  return h;
}

function lineSVG(vals,dates,color){
  if(vals.length<2)return'';
  const W=320,H=100,pad=8;
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;
  const pts=vals.map((v,i)=>{
    const x=pad+(W-2*pad)*(i/(vals.length-1));
    const y=H-pad-(v-mn)/range*(H-2*pad);
    return`${x},${y}`;
  });
  const last=vals[vals.length-1];
  const lx=parseFloat(pts[pts.length-1].split(',')[0]);
  const ly=parseFloat(pts[pts.length-1].split(',')[1]);
  return`<svg viewBox="0 0 ${W} ${H+20}" xmlns="http://www.w3.org/2000/svg" class="chart-svg">
<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="${lx}" cy="${ly}" r="4" fill="${color}"/>
<text x="${lx}" y="${ly-8}" text-anchor="middle" fill="rgba(235,235,245,.7)" font-size="11" font-family="-apple-system">${last}</text>
<text x="${pad}" y="${H+16}" fill="rgba(235,235,245,.35)" font-size="10" font-family="-apple-system">${fmtDate(dates[0])}</text>
<text x="${W-pad}" y="${H+16}" text-anchor="end" fill="rgba(235,235,245,.35)" font-size="10" font-family="-apple-system">${fmtDate(dates[dates.length-1])}</text>
</svg>`;
}
